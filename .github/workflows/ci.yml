name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key
  NEXT_PUBLIC_SITE_URL: https://www.gcserussian.com
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-${{ hashFiles('src/**/*', 'public/**/*', 'next.config.*', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-next-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Check SEO
        run: npm run seo:check

      - name: Test
        shell: bash
        run: |
          if npm pkg get scripts.test | grep -qv '^{}$'; then
            npm run test
          else
            echo "No test script found; skipping."
          fi

      - name: Build
        run: npm run build
